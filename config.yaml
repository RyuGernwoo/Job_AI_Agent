chunk_size_chars: 800
chunk_overlap_chars: 120
retrieval_top_k: 5
max_upload_mb: 20

llm:
  # MVP LLMOps default: OpenAI primary model through LiteLLM, Gemini fallback through Google AI Studio.
  provider: litellm
  model: gpt-4o-mini
  fallback_models:
    - gemini/gemini-3.5-flash
  timeout_seconds: 30
  # Revisions run slightly hotter than first-pass generation so a natural-language edit
  # diverges from the source package. Kept moderate so the strict output schema (sections,
  # counts, citation ids) still validates; the revision prompt drives the actual change.
  temperature: 0.1
  revision_temperature: 0.5
  callbacks:
    - langfuse_otel

  # Local/offline development option:
  # provider: mock
  # model: lessonpack-mock
  # fallback_models: []
  # callbacks: []

  # Legacy direct OpenAI-compatible HTTP endpoint option:
  # provider: http_chat
  # model: your-chat-model
  # base_url: https://api.example.com/v1/chat/completions
  # api_key_env: LESSONPACK_HTTP_API_KEY
  # timeout_seconds: 30

vector_store:
  # Use memory for local tests. Set provider to supabase for deployed persistence.
  provider: supabase
  table_name: lessonpack_chunks
  match_function: match_lessonpack_chunks
  match_threshold: 0.0
  baseline_project_id: mvp-dataset
  candidate_k: 20
  embedding_provider: hash
  embedding_model: lessonpack-hash-v1
  embedding_dimensions: 64
  embedding_column: embedding
  embedding_version: v1
