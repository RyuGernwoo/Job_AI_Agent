name: NCS Official API Sync

on:
  schedule:
    # Catalog: Monday 03:00 KST (Sunday 18:00 UTC)
    - cron: "0 18 * * 0"
    # Detail backfill: every day 03:30 KST (previous day 18:30 UTC)
    - cron: "30 18 * * *"
    # Modules: Tuesday 03:00 KST (Monday 18:00 UTC)
    - cron: "0 18 * * 1"
    # Full audit: second day of each month 04:00 KST (day 1 at 19:00 UTC)
    - cron: "0 19 1 * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Synchronization scope
        required: true
        default: all
        type: choice
        options:
          - catalog
          - detail
          - modules
          - all
      max_requests:
        description: Maximum official API requests
        required: true
        default: "5000"
        type: string
      limit:
        description: Optional record limit for a smoke run
        required: false
        default: ""
        type: string
      dry_run:
        description: Fetch and validate without writing to Supabase
        required: true
        default: false
        type: boolean

concurrency:
  group: ncs-official-api-sync
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  PYTHONPATH: src
  LECTUREOPS_VECTOR_STORE: supabase
  LESSONPACK_SUPABASE_TABLE: lessonpack_chunks
  LESSONPACK_SUPABASE_MATCH_FUNCTION: match_lessonpack_chunks_v2
  LESSONPACK_SUPABASE_EMBEDDING_COLUMN: embedding_v2
  LESSONPACK_EMBEDDING_PROVIDER: litellm
  LESSONPACK_EMBEDDING_MODEL: text-embedding-3-small
  LESSONPACK_EMBEDDING_DIMENSIONS: "1536"
  LESSONPACK_EMBEDDING_VERSION: v2
  LESSONPACK_NCS_SYNC_PROJECT_ID: mvp-dataset
  LESSONPACK_NCS_API_ENABLED: "true"
  LESSONPACK_NCS_SYNC_PAGE_SIZE: "100"
  LESSONPACK_NCS_SYNC_REQUESTS_PER_SECOND: "2"

jobs:
  sync:
    name: Synchronize official NCS data
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Synchronize NCS API
        env:
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE_EXPRESSION: ${{ github.event.schedule || '' }}
          INPUT_MODE: ${{ inputs.mode || '' }}
          INPUT_MAX_REQUESTS: ${{ inputs.max_requests || '5000' }}
          INPUT_LIMIT: ${{ inputs.limit || '' }}
          INPUT_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          mode="${INPUT_MODE:-all}"
          resume="true"
          if [ "$EVENT_NAME" = "schedule" ]; then
            case "$SCHEDULE_EXPRESSION" in
              "0 18 * * 0") mode="catalog" ;;
              "30 18 * * *") mode="detail" ;;
              "0 18 * * 1") mode="modules" ;;
              "0 19 1 * *") mode="all"; resume="false" ;;
              *) mode="all" ;;
            esac
          fi
          args=(
            --mode "$mode"
            --max-requests "$INPUT_MAX_REQUESTS"
          )
          if [ "$resume" = "true" ]; then
            args+=(--resume)
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          else
            args+=(--embed)
          fi
          if [ -n "$INPUT_LIMIT" ]; then
            args+=(--limit "$INPUT_LIMIT")
          fi
          python scripts/sync_ncs_official_api.py "${args[@]}" | tee ncs-sync-report.json
          if [ "$INPUT_DRY_RUN" != "true" ]; then
            python scripts/verify_ncs_official_sync.py | tee ncs-sync-verification.json
          fi

      - name: Upload sync report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ncs-sync-report
          path: |
            ncs-sync-report.json
            ncs-sync-verification.json
          if-no-files-found: warn
          retention-days: 30
