name: NCS Official API Sync

on:
  schedule:
    # Catalog: Monday 03:00 KST (Sunday 18:00 UTC)
    - cron: "0 18 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: Synchronization scope
        required: true
        default: catalog
        type: choice
        options:
          - catalog
          - detail
      unit_code:
        description: Required for detail mode (for example, 2001020231_23v5)
        required: false
        default: ""
        type: string
      max_requests:
        description: Maximum official API requests
        required: true
        default: "500"
        type: string
      limit:
        description: Optional record limit for a smoke run
        required: false
        default: ""
        type: string
      dry_run:
        description: Fetch and validate without writing to Supabase
        required: true
        default: false
        type: boolean
      embedding_batch_size:
        description: Maximum chunks per embedding and Supabase upsert batch
        required: true
        default: "8"
        type: string

concurrency:
  group: ncs-official-api-sync
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  PYTHONPATH: src
  LECTUREOPS_VECTOR_STORE: supabase
  LESSONPACK_SUPABASE_TABLE: lessonpack_chunks
  LESSONPACK_SUPABASE_MATCH_FUNCTION: match_lessonpack_chunks_v2
  LESSONPACK_SUPABASE_EMBEDDING_COLUMN: embedding_v2
  LESSONPACK_EMBEDDING_PROVIDER: litellm
  LESSONPACK_EMBEDDING_MODEL: text-embedding-3-small
  LESSONPACK_EMBEDDING_DIMENSIONS: "1536"
  LESSONPACK_EMBEDDING_VERSION: v2
  LESSONPACK_NCS_SYNC_PROJECT_ID: mvp-dataset
  LESSONPACK_NCS_API_ENABLED: "true"
  LESSONPACK_NCS_SYNC_PAGE_SIZE: "100"
  LESSONPACK_NCS_SYNC_REQUESTS_PER_SECOND: "2"
  LESSONPACK_NCS_SYNC_EMBEDDING_BATCH_SIZE: "8"
  LESSONPACK_NCS_MAX_SELECTED_UNITS: "50"
  LESSONPACK_SUPABASE_UPSERT_TIMEOUT_RETRIES: "2"
  LESSONPACK_SUPABASE_UPSERT_TIMEOUT_RETRY_DELAY_SECONDS: "0.5"

jobs:
  sync:
    name: Synchronize official NCS data
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Synchronize NCS API
        env:
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ inputs.mode || '' }}
          INPUT_UNIT_CODE: ${{ inputs.unit_code || '' }}
          INPUT_MAX_REQUESTS: ${{ inputs.max_requests || '500' }}
          INPUT_LIMIT: ${{ inputs.limit || '' }}
          INPUT_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          INPUT_EMBEDDING_BATCH_SIZE: ${{ inputs.embedding_batch_size || env.LESSONPACK_NCS_SYNC_EMBEDDING_BATCH_SIZE }}
        run: |
          set -euo pipefail
          mode="${INPUT_MODE:-catalog}"
          resume="true"
          if [ "$EVENT_NAME" = "schedule" ]; then
            mode="catalog"
          fi
          args=(
            --mode "$mode"
            --max-requests "$INPUT_MAX_REQUESTS"
            --embedding-batch-size "$INPUT_EMBEDDING_BATCH_SIZE"
          )
          if [ "$resume" = "true" ]; then
            args+=(--resume)
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          elif [ "$mode" = "detail" ]; then
            args+=(--embed)
          fi
          if [ "$mode" = "detail" ]; then
            if [ -z "$INPUT_UNIT_CODE" ]; then
              echo "unit_code is required for selective detail synchronization" >&2
              exit 2
            fi
            args+=(--unit-code "$INPUT_UNIT_CODE")
          fi
          if [ -n "$INPUT_LIMIT" ]; then
            args+=(--limit "$INPUT_LIMIT")
          fi
          python scripts/sync_ncs_official_api.py "${args[@]}" | tee ncs-sync-report.json
          if [ "$INPUT_DRY_RUN" != "true" ]; then
            python scripts/verify_ncs_official_sync.py --mode "$mode" | tee ncs-sync-verification.json
          fi

      - name: Upload sync report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ncs-sync-report
          path: |
            ncs-sync-report.json
            ncs-sync-verification.json
          if-no-files-found: warn
          retention-days: 30
