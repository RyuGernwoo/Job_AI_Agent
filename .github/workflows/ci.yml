name: LessonPack AI CI

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "data/gold/**"
      - "supabase/migrations/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "config.example.yaml"
      - ".env.example"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "data/gold/**"
      - "supabase/migrations/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "config.example.yaml"
      - ".env.example"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  PYTHONPATH: src

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall src scripts tests

      - name: Check provider configuration
        run: python scripts/check_llm_provider.py --config config.example.yaml --config-only

      - name: Check local RAG configuration
        run: python scripts/check_rag_readiness.py --allow-memory

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run unittest suite
        run: python -m unittest discover -s tests

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --file Dockerfile --tag lessonpack-ai:ci .

  report:
    name: Report Status
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs:
      - code-quality
      - unit-tests
      - docker-build
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Write CI result comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODE_QUALITY_RESULT: ${{ needs.code-quality.result }}
          UNIT_TESTS_RESULT: ${{ needs.unit-tests.result }}
          DOCKER_BUILD_RESULT: ${{ needs.docker-build.result }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          status_label() {
            case "$1" in
              success) printf 'PASS' ;;
              skipped) printf 'SKIPPED' ;;
              *) printf 'FAIL' ;;
            esac
          }

          {
            echo "### LessonPack AI CI Report"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Code Quality | $(status_label "$CODE_QUALITY_RESULT") ($CODE_QUALITY_RESULT) |"
            echo "| Unit Tests | $(status_label "$UNIT_TESTS_RESULT") ($UNIT_TESTS_RESULT) |"
            echo "| Docker Build Check | $(status_label "$DOCKER_BUILD_RESULT") ($DOCKER_BUILD_RESULT) |"
          } > ci-report.md

          gh pr comment "$PR_NUMBER" --repo "$GH_REPOSITORY" --body-file ci-report.md

          if [ "$CODE_QUALITY_RESULT" != "success" ] || [ "$UNIT_TESTS_RESULT" != "success" ] || [ "$DOCKER_BUILD_RESULT" != "success" ]; then
            exit 1
          fi
